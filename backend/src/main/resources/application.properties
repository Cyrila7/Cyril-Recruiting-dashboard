# CyrilHQ Backend Config
# ========================
# Email is sent via the Resend API (https://resend.com), not SMTP.
# Railway and most hosts block outbound SMTP, so this app uses Resend's HTTP API instead.
#
# SETUP:
# 1. Sign up at resend.com using the email you want to send/receive reminders from
# 2. Generate an API key from your Resend dashboard
# 3. Set it as an environment variable named RESEND_API_KEY
#    - Locally: export RESEND_API_KEY=re_your_key_here
#    - On Railway/Render/etc: add it in the platform's environment variables panel
#
# No email or password is stored in this file or anywhere in this repo.

spring.application.name=cyril-dashboard-backend
server.port=8080

# Logging
logging.level.com.dashboard=INFO

# Database (Railway Postgres — attach the Postgres plugin to this service,
# Railway auto-injects PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
adzuna.app.id=${ADZUNA_APP_ID}
adzuna.app.key=${ADZUNA_APP_KEY}